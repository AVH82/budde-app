<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Budd€</title><meta name="theme-color" content="#071107"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Budd€"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="assets/icon-192.png"><link rel="stylesheet" href="css/pipboy.css"></head>
<body><div class="app">
<header class="top"><img class="logo" src="assets/logo/budde_logo.png" alt="Budd€"></header>
<section class="monthbar"><button id="openMonth" class="cal" aria-label="Choisir mois">▦</button><button id="prevMonth" class="arrow" aria-label="Mois précédent">‹</button><button id="monthLabel" class="monthLabel"></button><button id="nextMonth" class="arrow" aria-label="Mois suivant">›</button></section>
<main>
<section class="card budgetCard"><div><div class="label">Budget mensuel</div><div id="budgetAmount" class="money"></div></div><div class="split"></div><div><div class="label">Budget restant</div><div id="remainingAmount" class="money remaining"></div><div class="bar"><i id="budgetProgress"></i></div><div id="spentAmount" class="spent"></div></div></section>
<section class="actions"><button data-action="scan"><span>▣</span><small>Scanner</small></button><button data-action="manual"><span>＋</span><small>Ajouter</small></button></section>
<section id="home" class="view active"><div class="card list"><div class="head"><h2>Dernières dépenses</h2><button data-view="expenses">Voir tout ›</button></div><div id="recentList"></div></div></section>
<section id="expenses" class="view"><div class="card list"><div class="head"><h2>Dépenses</h2></div><div id="expensesList"></div></div></section>
<section id="budget" class="view"><div class="card"><h2>Budget</h2><div class="form"><label>Carte</label><select id="budgetCard"></select><label>Mois</label><button id="budgetMonthPick" class="inputBtn"></button><label>Montant</label><input id="budgetInput" type="number" step="0.01"><button id="saveMonthBudget">Modifier ce mois uniquement</button><button id="saveFutureBudget">Modifier à partir de ce mois</button><p id="budgetMsg"></p></div></div></section>
<section id="stats" class="view"><div class="card"><h2>Statistiques</h2><div id="statsBox" class="stats"></div><button id="exportJson">Exporter Budde.data.json</button><label class="fileBtn">Importer Budde.data.json<input id="importJson" type="file" accept="application/json"></label></div></section>
<section id="merchants" class="view"><div class="card list"><div class="head"><h2>Commerçants</h2></div><div id="merchantsList"></div></div></section>
</main>
<nav class="nav"><button data-view="home" class="active" aria-label="Accueil"></button><button data-view="expenses" aria-label="Dépenses"></button><button data-view="budget" aria-label="Budget"></button><button data-view="stats" aria-label="Statistiques"></button><button data-view="merchants" aria-label="Commerçants"></button></nav>
</div>
<div id="monthModal" class="modal"><div class="sheet"><div class="sheetHead"><button id="yearPrev">‹</button><strong id="pickerYear"></strong><button id="yearNext">›</button></div><div id="monthGrid" class="monthGrid"></div><button id="closeMonth">Fermer</button></div></div>
<div id="expenseModal" class="modal"><div class="sheet"><h2 id="expenseTitle">Dépense</h2><div class="form"><label>Commerçant</label><input id="mMerchant"><label>Date</label><input id="mDate" type="date"><label>Montant</label><input id="mAmount" type="number" step="0.01"><label>Devise</label><select id="mCurrency"><option>EUR</option><option>USD</option><option>GBP</option><option>CHF</option></select><label>Taux vers EUR</label><input id="mRate" type="number" step="0.0001" value="1"><label>Catégorie</label><input id="mCategory"><label>Note</label><textarea id="mNote"></textarea><button id="saveExpense">Enregistrer</button><button id="cancelExpense">Annuler</button></div></div></div>
<script src="js/app.js"></script></body></html>
